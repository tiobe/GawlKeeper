name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins job
        run: curl -u ${{secrets.JENKINS_API_TOKEN}} "${{secrets.JENKINS_URL}}/job/GawlKeeper/buildWithParameters?token=${{secrets.JENKINS_TOKEN}}&BRANCH=main&RELEASE_TAG=${{github.event.release.tag_name}}"
